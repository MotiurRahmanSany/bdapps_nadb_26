name: orbit
description: A three-screen Flutter app (Login, Home, Profile) using Provider, SharedPreferences, and go_router.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Required packages for this assignment
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
